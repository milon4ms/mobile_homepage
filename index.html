<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার ব্রাউজার হোমপেজ</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--card-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-title { font-size: 1.2rem; font-weight: bold; }

        /* Search Bar */
        .search-container {
            padding: 15px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            box-sizing: border-box;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #e2e8f0;
            margin: 10px;
            border-radius: 8px;
            overflow: hidden;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: bold;
            color: #475569;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* Grid Layout */
        .content-section {
            display: none;
            padding: 15px;
        }
        .content-section.active { display: block; }

        .category-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }

        .link-item {
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
        }

        .icon-wrapper {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .icon-wrapper img { width: 30px; height: 30px; }

        /* Floating Add Button */
        .add-btn {
            background: #10b981;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            border: none;
        }

        .more-folder { background: #cbd5e1; }
    </style>
</head>
<body>

<header>
    <i data-lucide="chevron-left"></i>
    <div class="header-title">আমার ব্রাউজার হোমপেজ <i data-lucide="home" style="width: 18px;"></i></div>
    <i data-lucide="settings" onclick="toggleTheme()"></i>
</header>

<div class="search-container">
    <form action="https://www.google.com/search" method="GET">
        <input type="text" name="q" class="search-box" placeholder="গুগল সার্চ করুন...">
    </form>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'tab1')">ট্যাব ১</button>
    <button class="tab-btn" onclick="openTab(event, 'tab2')">ট্যাব ২</button>
    <button class="tab-btn" onclick="openTab(event, 'tab3')">ট্যাব ৩</button>
    <button class="tab-btn" style="background: #d1fae5; color: #065f46;">+ অ্যাড লিংক</button>
</div>

<div id="tab1" class="content-section active">
    <div class="category-title">জনপ্রিয়</div>
    <div class="link-grid">
        <a href="https://google.com" class="link-item">
            <div class="icon-wrapper"><img src="https://www.google.com/favicon.ico"></div>
            <span>Google</span>
        </a>
        <a href="https://youtube.com" class="link-item">
            <div class="icon-wrapper"><img src="https://www.youtube.com/favicon.ico"></div>
            <span>YouTube</span>
        </a>
        <a href="https://facebook.com" class="link-item">
            <div class="icon-wrapper"><img src="https://www.facebook.com/favicon.ico"></div>
            <span>Facebook</span>
        </a>
        <a href="https://whatsapp.com" class="link-item">
            <div class="icon-wrapper"><img src="https://static.whatsapp.net/rsrc.php/v3/yP/r/r_o_p0Vv09B.png"></div>
            <span>WhatsApp</span>
        </a>
        <a href="https://wikipedia.org" class="link-item">
            <div class="icon-wrapper"><img src="https://en.wikipedia.org/favicon.ico"></div>
            <span>Wikipedia</span>
        </a>
        <div class="link-item">
            <div class="icon-wrapper more-folder"><i data-lucide="folder-plus"></i></div>
            <span>More</span>
        </div>
    </div>
</div>

<div id="tab2" class="content-section">
    <div class="category-title">শিক্ষা ও সংবাদ</div>
    <div class="link-grid">
        </div>
</div>

<div id="tab3" class="content-section">
    <div class="category-title">অন্যান্য</div>
    <div class="link-grid">
        </div>
</div>

<script>
    // Initialize Icons
    lucide.createIcons();

    // Tab Logic
    function openTab(evt, tabName) {
        var i, content, tablinks;
        content = document.getElementsByClassName("content-section");
        for (i = 0; i < content.length; i++) {
            content[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // Dark Mode Toggle
    function toggleTheme() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }
</script>

</body>
</html>
